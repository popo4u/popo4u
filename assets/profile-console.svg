<svg width="1120" height="520" viewBox="0 0 1120 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">One / popo4u GitHub profile console</title>
  <desc id="desc">AI-driven full-stack engineer building security products, automation workflows, and small systems.</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#45c9f5" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow-green" cx="82%" cy="8%" r="42%" fx="82%" fy="8%">
      <stop offset="0%" stop-color="#39d98a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#39d98a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="12%" cy="20%" r="44%" fx="12%" fy="20%">
      <stop offset="0%" stop-color="#45c9f5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#45c9f5" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #dbe4ef; }
      .muted { fill: #8998aa; }
      .faint { fill: #5d6b7d; }
      .green { fill: #39d98a; }
      .cyan { fill: #45c9f5; }
      .amber { fill: #efbc62; }
    </style>
  </defs>

  <rect width="1120" height="520" rx="0" fill="#07090d"/>
  <rect width="1120" height="520" fill="url(#grid)"/>
  <rect width="1120" height="520" fill="url(#glow-green)"/>
  <rect width="1120" height="520" fill="url(#glow-cyan)"/>

  <g filter="url(#shadow)">
