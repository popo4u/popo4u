      <rect x="248" y="331" width="58" height="34" rx="6" fill="#101821" stroke="#243242"/>
      <text x="277" y="353" text-anchor="middle" class="text">Page</text>
      <rect x="316" y="331" width="74" height="34" rx="6" fill="#101821" stroke="#243242"/>
      <text x="353" y="353" text-anchor="middle" class="text">Resume</text>
      <rect x="400" y="331" width="42" height="34" rx="6" fill="#101821" stroke="#243242"/>
      <text x="421" y="353" text-anchor="middle" class="text">X</text>
