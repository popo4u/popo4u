    <rect x="660" y="112" width="374" height="276" rx="8" fill="#101821" stroke="#243242"/>
    <circle cx="704" cy="156" r="27" fill="#111821" stroke="#243242"/>
    <text x="704" y="166" text-anchor="middle" class="mono green" font-size="24" font-weight="700">O</text>
    <text x="748" y="150" class="mono text" font-size="17" font-weight="700">One</text>
    <text x="748" y="174" class="sans muted" font-size="14">Chaitin - HangZhou</text>
    <path d="M684 202 H1012" stroke="#192432"/>

    <text x="684" y="235" class="mono green" font-size="15">~/profile</text>
    <text x="684" y="263" class="mono muted" font-size="15">|- handle     </text>
    <text x="806" y="263" class="mono text" font-size="15" font-weight="700">popo4u</text>
    <text x="684" y="291" class="mono muted" font-size="15">|- focus      </text>
    <text x="806" y="291" class="mono text" font-size="15" font-weight="700">ai-driven full-stack engineering</text>
    <text x="684" y="319" class="mono muted" font-size="15">|- currently  building security products</text>
    <text x="684" y="347" class="mono muted" font-size="15">|- languages  C, Go, Lua, Rust, Python, TypeScript</text>
    <text x="684" y="375" class="mono muted" font-size="15">`- status     </text>
    <text x="806" y="375" class="mono cyan" font-size="15">online</text>
    <text x="860" y="375" class="mono muted" font-size="15">, embracing the AI shift</text>

    <text x="74" y="438" class="mono faint" font-size="14">$ uptime: building since 2015</text>
    <text x="560" y="438" text-anchor="middle" class="mono green" font-size="14">0. Problems are inevitable  1. Problems are soluble</text>
