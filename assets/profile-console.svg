    <rect x="32" y="34" width="1056" height="46" rx="8" fill="#0a1017"/>
    <path d="M32 72 H1088" stroke="#243242"/>
    <circle cx="56" cy="57" r="6" fill="#ff6b6b"/>
    <circle cx="76" cy="57" r="6" fill="#efbc62"/>
